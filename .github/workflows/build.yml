
name: CI Build

on:
  push:
    branches: [tree-decomposition]
  pull_request:
    branches: [tree-decomposition]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake libgmp-dev libmpfr-dev libboost-all-dev

      - name: Build
        run: ./setupdev.sh

      - name: Check Binary
        run: ls bin/td bin/flow_cutter_pace17


